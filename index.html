<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Vault | Secure Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; -webkit-font-smoothing: antialiased; }
        .bento-card { border: 1px solid #1a1a1a; background: #050505; transition: all 0.4s ease; }
        .bento-card:hover { border-color: #333; }
        input::placeholder { color: #222; }
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <div class="md:col-span-2 mb-6 px-2 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-light tracking-widest uppercase italic">NFC <span class="font-black not-italic text-white">VAULT</span></h1>
                <div class="h-1 w-12 bg-white mt-2"></div>
            </div>
            <div class="text-[10px] text-zinc-700 font-mono text-right uppercase tracking-tighter">
                Secure Client-Side<br>Encryption Active
            </div>
        </div>

        <div class="bento-card p-8 rounded-2xl flex flex-col space-y-6">
            <h2 class="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500">Secure Write</h2>
            
            <div class="space-y-4">
                <div class="group">
                    <label class="block text-[10px] uppercase text-zinc-600 mb-1">User Name</label>
                    <input type="text" id="userName" placeholder="Full Name" 
                        class="w-full bg-transparent border-b border-zinc-800 focus:border-white outline-none py-2 text-lg transition-all">
                </div>
                <div class="group">
                    <label class="block text-[10px] uppercase text-zinc-600 mb-1">Balance</label>
                    <input type="number" id="userBalance" placeholder="0.00" 
                        class="w-full bg-transparent border-b border-zinc-800 focus:border-white outline-none py-2 text-lg transition-all">
                </div>
                <div class="group pt-4 border-t border-zinc-900">
                    <label class="block text-[10px] uppercase text-red-900 mb-1 font-bold">Admin Password</label>
                    <input type="password" id="adminPass" placeholder="••••••••" 
                        class="w-full bg-transparent border-b border-zinc-800 focus:border-red-900 outline-none py-2 text-lg transition-all text-red-500">
                </div>
            </div>

            <button onclick="writeToTag()" 
                class="w-full py-4 bg-white text-black font-black uppercase text-[10px] tracking-[0.3em] hover:bg-zinc-200 active:scale-[0.98] transition-all rounded-lg">
                Authorize & Write
            </button>
        </div>

        <div class="bento-card p-8 rounded-2xl flex flex-col justify-between border-dashed border-zinc-800">
            <div>
                <h2 class="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 mb-10">Scan Result</h2>
                <div id="readOutput" class="space-y-8 opacity-10 transition-all duration-700">
                    <div>
                        <p class="text-[10px] uppercase text-zinc-600">User</p>
                        <p id="displayName" class="text-3xl font-light tracking-tight">—</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-zinc-600">Balance</p>
                        <p id="displayBalance" class="text-4xl font-black italic text-zinc-200">—</p>
                    </div>
                </div>
            </div>
            <button onclick="readTag()" 
                class="w-full py-4 mt-12 border border-zinc-800 text-white font-black uppercase text-[10px] tracking-[0.3em] hover:bg-zinc-900 active:scale-[0.98] transition-all rounded-lg">
                Read Chip
            </button>
        </div>

        <div class="md:col-span-2 mt-4">
            <div id="statusBox" class="bg-zinc-900/30 border border-zinc-900 p-3 rounded-lg flex items-center justify-between">
                <span id="status" class="text-[10px] font-mono text-zinc-600 uppercase tracking-widest flex items-center">
                    System Idle
                </span>
            </div>
        </div>
    </div>

    <script>
        // CHANGE YOUR PASSWORD HERE
        const SECRET_PASSWORD = "damian2013!248"; 

        const statusEl = document.getElementById('status');

        function updateStatus(msg, isError = false) {
            statusEl.innerHTML = `<span class="inline-block w-1.5 h-1.5 ${isError ? 'bg-red-800' : 'bg-zinc-600'} rounded-full mr-3"></span>${msg}`;
            if (isError) {
                // Short double vibrate for error
                if ("vibrate" in navigator) navigator.vibrate([50, 50, 50]);
            }
        }

        async function writeToTag() {
            const name = document.getElementById('userName').value;
            const balance = document.getElementById('userBalance').value;
            const passInput = document.getElementById('adminPass').value;

            // 1. Password Check
            if (passInput !== SECRET_PASSWORD) {
                updateStatus("Security Error: Invalid Admin Password", true);
                return;
            }

            if (!name || !balance) {
                updateStatus("Input Error: Data Fields Empty", true);
                return;
            }

            const data = JSON.stringify({ name, balance });

            try {
                if (!('NDEFReader' in window)) throw new Error("Web NFC unsupported");
                
                const ndef = new NDEFReader();
                updateStatus("Ready: Hold Chip to Back of Phone...");
                await ndef.write(data);
                
                // Success feedback
                if ("vibrate" in navigator) navigator.vibrate(200);
                updateStatus("Success: Tag Encrypted");
                
                // Clear password and inputs
                document.getElementById('adminPass').value = '';
                document.getElementById('userName').value = '';
                document.getElementById('userBalance').value = '';
            } catch (error) {
                updateStatus(`HW Error: ${error.message}`, true);
            }
        }

        async function readTag() {
            try {
                if (!('NDEFReader' in window)) throw new Error("Web NFC unsupported");

                const ndef = new NDEFReader();
                await ndef.scan();
                updateStatus("Scanning: Tap Chip...");

                ndef.onreading = event => {
                    const decoder = new TextDecoder();
                    for (const record of event.message.records) {
                        const rawData = decoder.decode(record.data);
                        try {
                            const parsed = JSON.parse(rawData);
                            document.getElementById('displayName').innerText = parsed.name;
                            document.getElementById('displayBalance').innerText = `$${parsed.balance}`;
                            document.getElementById('readOutput').classList.replace('opacity-10', 'opacity-100');
                            
                            if ("vibrate" in navigator) navigator.vibrate(100);
                            updateStatus("Read: Complete");
                        } catch (e) {
                            updateStatus("Data Error: Chip format unrecognized", true);
                        }
                    }
                };
            } catch (error) {
                updateStatus(`HW Error: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
