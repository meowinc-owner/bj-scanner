<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Vault | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@900&display=swap');
        body { font-family: 'Space Mono', monospace; background-color: #000; color: #fff; -webkit-font-smoothing: antialiased; }
        .card-glass { background: #0a0a0a; border: 1px solid #1a1a1a; }
        .big-money { font-family: 'Inter', sans-serif; letter-spacing: -0.05em; line-height: 1; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .btn-nfc:disabled { opacity: 0.15; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center py-6">

    <div class="max-w-2xl w-full space-y-6">
        
        <div class="flex justify-between items-center px-2">
            <h1 class="text-xl font-bold tracking-tighter italic text-zinc-400">♠️ VAULT_COMMAND_V5</h1>
            <div class="flex items-center gap-3">
                <button onclick="exportData()" class="text-[10px] text-zinc-600 hover:text-white uppercase tracking-widest">Backup</button>
                <button onclick="document.getElementById('importFile').click()" class="text-[10px] text-zinc-600 hover:text-white uppercase tracking-widest">Restore</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                <input type="password" id="adminPass" placeholder="PASS" class="w-28 bg-transparent border-b border-zinc-800 text-xs outline-none text-red-600 text-center ml-2">
            </div>
        </div>

        <div class="card-glass p-8 rounded-[2.5rem] space-y-8">
            <div>
                <label class="text-[10px] text-zinc-600 uppercase tracking-widest mb-3 block font-bold">Player Identity</label>
                <input type="text" id="pName" placeholder="NAME" class="w-full bg-transparent border-b-2 border-zinc-800 py-2 outline-none focus:border-white uppercase text-4xl font-black tracking-tighter">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div>
                    <label class="text-[10px] text-zinc-600 uppercase tracking-widest mb-3 block font-bold">Physical Cash ($)</label>
                    <input type="number" id="pChips" placeholder="0" class="w-full bg-transparent border-b-2 border-zinc-800 py-1 outline-none text-green-500 text-6xl font-black big-money">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[10px] text-red-900 uppercase tracking-widest font-bold">Debt Amount ($)</label>
                        <button onclick="clearDebtInputs()" class="text-[10px] text-zinc-500 underline uppercase">Reset</button>
                    </div>
                    <input type="number" id="debtAmt1" placeholder="0" class="w-full bg-transparent border-b-2 border-zinc-800 py-1 outline-none text-red-600 text-6xl font-black big-money">
                    <input type="text" id="debtor1" placeholder="OWED TO..." class="w-full bg-transparent border-b border-zinc-900 py-3 text-sm outline-none uppercase text-zinc-500 mt-2 font-bold focus:border-red-900">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3 pt-6">
                <button onclick="saveLocal()" class="bg-zinc-900 border border-zinc-800 py-5 rounded-2xl text-[12px] font-bold uppercase tracking-[0.3em] hover:bg-zinc-800 transition-all">
                    💾 Save to Master Ledger
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="saveTagOnly()" class="btn-nfc border-2 border-zinc-800 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest">🏷️ Write to Tag</button>
                    <button onclick="saveBoth()" class="btn-nfc bg-white text-black py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest hover:bg-zinc-200 active:scale-95">⚡ Full Sync</button>
                </div>
            </div>
        </div>

        <div id="displayArea" class="card-glass p-8 rounded-[2rem] opacity-20 border-2 border-dashed border-zinc-900 transition-all duration-500">
            <div class="flex flex-col items-center text-center">
                <h2 id="outName" class="text-4xl font-black italic uppercase mb-2">—</h2>
                <p id="outNet" class="text-8xl font-black big-money text-green-500 mb-6">$0</p>
                <div id="debtList" class="w-full bg-red-950/10 rounded-2xl p-4 border border-red-950/20 text-red-600 font-bold uppercase text-lg">
                    </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="readAccount()" class="btn-nfc py-5 border-2 border-zinc-800 rounded-2xl text-xs font-bold uppercase tracking-widest">Scan Tag</button>
                <button onclick="cashOut()" class="btn-nfc py-5 border-2 border-red-900 text-red-600 rounded-2xl text-xs font-bold uppercase tracking-widest">Wipe Tag</button>
            </div>
        </div>

        <div class="card-glass p-8 rounded-[2rem]">
            <h3 class="text-[11px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-6">Master Ledger</h3>
            <div id="storageLog" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
        </div>

        <p id="status" class="text-[10px] text-zinc-800 text-center uppercase tracking-[0.5em] font-bold py-10">Hardware.Ready</p>
    </div>

    <script>
        const PASS = "damian2013!248"; 
        let database = JSON.parse(localStorage.getItem('blackjack_db')) || {};

        function checkNFC() {
            if (!('NDEFReader' in window)) {
                alert("NFC Error: Phone required for tag features.");
                return false;
            }
            return true;
        }

        function clearDebtInputs() {
            document.getElementById('debtAmt1').value = '';
            document.getElementById('debtor1').value = '';
        }

        function log(msg, err = false) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.className = err ? "text-[10px] text-red-900 text-center uppercase tracking-[0.5em] font-bold" : "text-[10px] text-zinc-700 text-center uppercase tracking-[0.5em] font-bold";
        }

        // --- CORE TRANSACTION LOGIC ---
        function paySpecificDebt(debtorName) {
            if (document.getElementById('adminPass').value !== PASS) return alert("Wrong Password");
            const debtor = database[debtorName];
            const amount = debtor.d1.amt;
            const receiverName = debtor.d1.name.trim().toUpperCase();

            if (confirm(`SETTLE: Take $${amount} from ${debtorName} and pay ${receiverName}?`)) {
                debtor.c -= amount;
                if (database[receiverName]) {
                    database[receiverName].c += amount;
                } else {
                    alert(`${receiverName} not found in system. Cash removed from payer only.`);
                }
                debtor.d1.amt = 0;
                debtor.d1.name = "";
                localStorage.setItem('blackjack_db', JSON.stringify(database));
                renderLog();
                log("TRANSACTION_OK");
            }
        }

        // --- INDIVIDUAL TAG WRITER ---
        async function writeToTag(name) {
            if (!checkNFC()) return;
            const player = database[name];
            try {
                const ndef = new NDEFReader();
                log(`TAP TAG FOR ${name}...`);
                await ndef.write(JSON.stringify(player));
                log(`TAG_WRITTEN: ${name}`);
            } catch (e) { log("NFC_ERROR", true); }
        }

        function deleteAccount(name) {
            if (document.getElementById('adminPass').value !== PASS) return alert("Wrong Password");
            if (confirm(`Delete ${name}?`)) {
                delete database[name];
                localStorage.setItem('blackjack_db', JSON.stringify(database));
                renderLog();
            }
        }

        function renderLog() {
            const logEl = document.getElementById('storageLog');
            logEl.innerHTML = '';
            const entries = Object.values(database).reverse();
            if (entries.length === 0) {
                logEl.innerHTML = '<p class="text-[10px] text-zinc-800 italic text-center py-6 uppercase font-bold tracking-widest">No Active Records</p>';
                return;
            }
            entries.forEach(p => {
                const hasDebt = p.d1.amt > 0;
                const row = document.createElement('div');
                row.className = "p-6 border border-zinc-900 rounded-[1.5rem] bg-zinc-950/50 space-y-4";
                row.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-3xl font-black uppercase text-white tracking-tighter">${p.n}</span>
                            <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest mt-1">Cash: $${p.c.toLocaleString()}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                             <button onclick="writeToTag('${p.n}')" class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-zinc-300">🏷️ Write Tag</button>
                        </div>
                    </div>
                    
                    ${hasDebt ? `
                    <div class="bg-red-950/20 border border-red-900/30 p-4 rounded-xl flex justify-between items-center">
                        <span class="text-sm font-bold uppercase text-red-500">Owes ${p.d1.name}: $${p.d1.amt.toLocaleString()}</span>
                        <button onclick="paySpecificDebt('${p.n}')" class="bg-red-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Settle</button>
                    </div>
                    ` : ''}

                    <div class="flex justify-end pt-2">
                        <button onclick="deleteAccount('${p.n}')" class="text-[9px] text-zinc-800 hover:text-red-600 transition-all uppercase font-bold">Remove Account</button>
                    </div>`;
                logEl.appendChild(row);
            });
        }

        function getFormData() {
            return {
                n: document.getElementById('pName').value.trim().toUpperCase(),
                c: parseFloat(document.getElementById('pChips').value) || 0,
                d1: { name: document.getElementById('debtor1').value.trim().toUpperCase(), amt: parseFloat(document.getElementById('debtAmt1').value) || 0 }
            };
        }

        function saveLocal() {
            if (document.getElementById('adminPass').value !== PASS) return log("PASS_DENIED", true);
            const player = getFormData();
            if (!player.n) return alert("ENTER NAME");
            database[player.n] = player;
            localStorage.setItem('blackjack_db', JSON.stringify(database));
            renderLog();
            log("DB_UPDATED");
        }

        async function saveTagOnly() {
            if (!checkNFC()) return;
            if (document.getElementById('adminPass').value !== PASS) return log("PASS_DENIED", true);
            const player = getFormData();
            try {
                const ndef = new NDEFReader();
                log("TAP_WRITE...");
                await ndef.write(JSON.stringify(player));
                log("TAG_OK");
            } catch (e) { log("NFC_ERROR", true); }
        }

        async function saveBoth() {
            if (!checkNFC()) return;
            if (document.getElementById('adminPass').value !== PASS) return log("PASS_DENIED", true);
            const player = getFormData();
            try {
                const ndef = new NDEFReader();
                log("SYNCING...");
                await ndef.write(JSON.stringify(player));
                saveLocal();
                log("SYNC_COMPLETE");
            } catch (e) { log("SYNC_ERROR", true); }
        }

        async function readAccount() {
            if (!checkNFC()) return;
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                log("SCANNING...");
                ndef.onreading = e => {
                    const data = JSON.parse(new TextDecoder().decode(e.message.records[0].data));
                    const net = data.c - (data.d1.amt || 0);
                    document.getElementById('outName').innerText = data.n;
                    document.getElementById('outNet').innerText = `$${net.toLocaleString()}`;
                    document.getElementById('debtList').innerText = data.d1.amt > 0 ? `OWES ${data.d1.name}: $${data.d1.amt}` : 'CLEAR';
                    document.getElementById('displayArea').style.opacity = "1";
                    log("READ_OK");
                };
            } catch (e) { log("READ_FAIL", true); }
        }

        async function cashOut() {
            if (!checkNFC()) return;
            if (document.getElementById('adminPass').value !== PASS) return log("PASS_DENIED", true);
            try {
                const ndef = new NDEFReader();
                log("WIPING...");
                await ndef.write(JSON.stringify({n: "EMPTY", c: 0, d1: {name: "", amt: 0}}));
                log("WIPED");
            } catch (e) { log("WIPE_FAIL", true); }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(database));
            const dl = document.createElement('a');
            dl.href = dataStr;
            dl.download = "blackjack_vault_V5.json";
            dl.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                database = JSON.parse(event.target.result);
                localStorage.setItem('blackjack_db', JSON.stringify(database));
                renderLog();
            };
            reader.readAsText(e.target.files[0]);
        }

        renderLog();
    </script>
</body>
</html>
