<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Ledger Pro + Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space Mono', monospace; background-color: #000; color: #fff; }
        .card-glass { background: #0a0a0a; border: 1px solid #1a1a1a; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center py-10">

    <div class="max-w-2xl w-full space-y-6">
        
        <div class="flex justify-between items-center px-2">
            <h1 class="text-xl font-bold tracking-tighter">♠️ SYSTEM_VAULT</h1>
            <div class="flex gap-2">
                <button onclick="exportData()" class="text-[8px] border border-zinc-800 px-2 py-1 hover:bg-zinc-900 uppercase">Export</button>
                <button onclick="document.getElementById('importFile').click()" class="text-[8px] border border-zinc-800 px-2 py-1 hover:bg-zinc-900 uppercase">Import</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                <input type="password" id="adminPass" placeholder="PASS" class="w-10 bg-transparent border-b border-zinc-800 text-[10px] outline-none text-red-600 ml-2">
            </div>
        </div>

        <div class="card-glass p-6 rounded-2xl space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <input type="text" id="pName" placeholder="PLAYER NAME" class="w-full bg-transparent border-b border-zinc-800 py-2 outline-none focus:border-white uppercase text-sm">
                </div>
                <div>
                    <label class="text-[9px] text-zinc-500 uppercase">Chips ($)</label>
                    <input type="number" id="pChips" placeholder="0.00" class="w-full bg-transparent border-b border-zinc-800 py-1 outline-none">
                </div>
                <div>
                    <label class="text-[9px] text-zinc-500 uppercase">Debt (Owes)</label>
                    <input type="text" id="debtor1" placeholder="Who?" class="w-full bg-transparent border-b border-zinc-800 py-1 text-[10px] outline-none mb-1 uppercase">
                    <input type="number" id="debtAmt1" placeholder="$0.00" class="w-full bg-transparent border-b border-zinc-800 py-1 text-[10px] outline-none">
                </div>
            </div>
            <button onclick="writeAccount()" class="w-full py-4 bg-white text-black font-bold text-xs uppercase tracking-widest rounded-lg active:scale-95 transition-all">
                Update & Save to Tag
            </button>
        </div>

        <div id="displayArea" class="card-glass p-6 rounded-2xl opacity-20 transition-all border-dashed border-zinc-800">
            <div class="flex justify-between items-baseline mb-4">
                <h2 id="outName" class="text-xl font-bold italic">—</h2>
                <div class="text-right">
                    <p id="outNet" class="text-sm font-bold text-green-500">$0.00</p>
                    <p class="text-[8px] text-zinc-600 uppercase italic">Net Worth</p>
                </div>
            </div>
            <div id="debtList" class="space-y-1 mb-6"></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="readAccount()" class="py-3 border border-zinc-800 rounded-lg text-[10px] font-bold uppercase">Scan Tag</button>
                <button onclick="cashOut()" class="py-3 border border-red-900 text-red-900 rounded-lg text-[10px] font-bold uppercase">Cash Out</button>
            </div>
        </div>

        <div class="card-glass p-6 rounded-2xl">
            <h3 class="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-[0.2em]">Local Audit Log (Saved)</h3>
            <div id="storageLog" class="space-y-2 max-h-60 overflow-y-auto scroll-hide">
                </div>
        </div>

        <p id="status" class="text-[8px] text-zinc-800 text-center uppercase tracking-[0.4em]">Hardware.Standby</p>
    </div>

    <script>
        const PASS = "damian2013!248"; 
        let database = JSON.parse(localStorage.getItem('blackjack_db')) || {};

        function saveDB() {
            localStorage.setItem('blackjack_db', JSON.stringify(database));
            renderLog();
        }

        function renderLog() {
            const logEl = document.getElementById('storageLog');
            logEl.innerHTML = '';
            Object.values(database).reverse().forEach(p => {
                const net = p.c - (p.d1.amt || 0);
                logEl.innerHTML += `
                    <div class="flex justify-between items-center text-[10px] py-2 border-b border-zinc-900">
                        <span class="font-bold uppercase">${p.n}</span>
                        <span class="${net < 0 ? 'text-red-500' : 'text-zinc-400'}">$${net.toFixed(2)}</span>
                    </div>`;
            });
        }

        async function writeAccount() {
            if (document.getElementById('adminPass').value !== PASS) return alert("ACCESS DENIED");
            
            const player = {
                n: document.getElementById('pName').value,
                c: parseFloat(document.getElementById('pChips').value) || 0,
                d1: { name: document.getElementById('debtor1').value, amt: parseFloat(document.getElementById('debtAmt1').value) || 0 }
            };

            if (!player.n) return;

            try {
                // Save to Local DB
                database[player.n] = player;
                saveDB();

                // Attempt NFC Write
                const ndef = new NDEFReader();
                await ndef.write(JSON.stringify(player));
                if ("vibrate" in navigator) navigator.vibrate(200);
                document.getElementById('status').innerText = "DATA_SYNCED";
            } catch (e) { 
                document.getElementById('status').innerText = "SAVED_TO_LOCAL_ONLY_NO_NFC";
            }
        }

        async function readAccount() {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                ndef.onreading = e => {
                    const data = JSON.parse(new TextDecoder().decode(e.message.records[0].data));
                    const net = data.c - data.d1.amt;

                    document.getElementById('outName').innerText = data.n;
                    document.getElementById('outNet').innerText = `$${net.toFixed(2)}`;
                    document.getElementById('debtList').innerHTML = data.d1.name ? 
                        `<div class="flex justify-between text-[10px] text-red-500"><span>OWES ${data.d1.name}</span><span>-$${data.d1.amt.toFixed(2)}</span></div>` : '';
                    
                    document.getElementById('displayArea').classList.replace('opacity-20', 'opacity-100');
                    if ("vibrate" in navigator) navigator.vibrate(100);
                    
                    // Update Local DB with scanned data in case it's new
                    database[data.n] = data;
                    saveDB();
                };
            } catch (e) { alert("NFC Read Failed: Ensure you are on Android Chrome."); }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(database));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "blackjack_accounts.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                database = JSON.parse(e.target.result);
                saveDB();
                alert("Database Imported Successfully");
            };
            reader.readAsText(event.target.files[0]);
        }

        async function cashOut() {
            if (document.getElementById('adminPass').value !== PASS) return alert("ACCESS DENIED");
            try {
                const ndef = new NDEFReader();
                await ndef.write(JSON.stringify({n: "EMPTY", c: 0, d1: {name: "", amt: 0}}));
                document.getElementById('status').innerText = "TAG_CLEARED";
            } catch (e) { alert("Tag Reset Failed"); }
        }

        renderLog(); // Initial Load
    </script>
</body>
</html>
