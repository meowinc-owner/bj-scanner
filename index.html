<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Vault | Corrected Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@900&display=swap');
        body { font-family: 'Space Mono', monospace; background-color: #000; color: #fff; -webkit-font-smoothing: antialiased; }
        .card-glass { background: #0a0a0a; border: 1px solid #1a1a1a; }
        .big-money { font-family: 'Inter', sans-serif; letter-spacing: -0.05em; line-height: 1; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .btn-nfc:disabled { opacity: 0.15; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center py-6">

    <div class="max-w-2xl w-full space-y-6">
        
        <div class="flex justify-between items-center px-2">
            <h1 class="text-xl font-bold tracking-tighter italic text-zinc-400">♠️ VAULT_FIXED_MATH</h1>
            <div class="flex items-center gap-3">
                <button onclick="exportData()" class="text-[10px] text-zinc-600 hover:text-white uppercase tracking-widest">Backup</button>
                <button onclick="document.getElementById('importFile').click()" class="text-[10px] text-zinc-600 hover:text-white uppercase tracking-widest">Restore</button>
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                <input type="password" id="adminPass" placeholder="PASS" class="w-28 bg-transparent border-b border-zinc-800 text-xs outline-none text-red-600 text-center ml-2">
            </div>
        </div>

        <div class="card-glass p-8 rounded-[2.5rem] space-y-8">
            <div>
                <label class="text-[10px] text-zinc-600 uppercase tracking-widest mb-3 block font-bold">Player Identity</label>
                <input type="text" id="pName" placeholder="NAME" class="w-full bg-transparent border-b-2 border-zinc-800 py-2 outline-none focus:border-white uppercase text-4xl font-black tracking-tighter">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div>
                    <label class="text-[10px] text-zinc-600 uppercase tracking-widest mb-3 block font-bold">Cash Balance ($)</label>
                    <input type="number" id="pChips" placeholder="0" class="w-full bg-transparent border-b-2 border-zinc-800 py-1 outline-none text-green-500 text-6xl font-black big-money">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[10px] text-red-900 uppercase tracking-widest font-bold">Debt Amount ($)</label>
                        <button onclick="clearDebtInputs()" class="text-[10px] text-zinc-500 underline uppercase">Reset</button>
                    </div>
                    <input type="number" id="debtAmt1" placeholder="0" class="w-full bg-transparent border-b-2 border-zinc-800 py-1 outline-none text-red-600 text-6xl font-black big-money">
                    <input type="text" id="debtor1" placeholder="OWED TO WHO?" class="w-full bg-transparent border-b border-zinc-900 py-3 text-sm outline-none uppercase text-zinc-500 mt-2 font-bold focus:border-red-900">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3 pt-6">
                <button onclick="saveLocal()" class="bg-zinc-900 border border-zinc-800 py-5 rounded-2xl text-[12px] font-bold uppercase tracking-[0.3em] hover:bg-zinc-800 transition-all">
                    💾 Save to Master Ledger
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="saveTagOnly()" class="btn-nfc border-2 border-zinc-800 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest">🏷️ Tag Only</button>
                    <button onclick="saveBoth()" class="btn-nfc bg-white text-black py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest hover:bg-zinc-200 active:scale-95">⚡ Sync Both</button>
                </div>
            </div>
        </div>

        <div class="card-glass p-8 rounded-[2rem]">
            <h3 class="text-[11px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-6">Stored Accounts</h3>
            <div id="storageLog" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
        </div>

        <p id="status" class="text-[10px] text-zinc-800 text-center uppercase tracking-[0.5em] font-bold py-10">System.Ready</p>
    </div>

    <script>
        const PASS = "damian2013!248"; 
        let database = JSON.parse(localStorage.getItem('blackjack_db')) || {};

        function checkNFC() {
            if (!('NDEFReader' in window)) {
                alert("NFC Error: Chromebook/PC detected. Use your phone for NFC features.");
                return false;
            }
            return true;
        }

        function clearDebtInputs() {
            document.getElementById('debtAmt1').value = '';
            document.getElementById('debtor1').value = '';
        }

        function log(msg, err = false) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.className = err ? "text-[10px] text-red-900 text-center uppercase tracking-[0.5em] font-bold" : "text-[10px] text-zinc-700 text-center uppercase tracking-[0.5em] font-bold";
        }

        // --- CORRECTED TRANSFER LOGIC ---
        function paySpecificDebt(debtorName) {
            if (document.getElementById('adminPass').value !== PASS) return alert("Wrong Password");
            
            const debtor = database[debtorName];
            const amount = debtor.d1.amt;
            const receiverName = debtor.d1.name.trim().toUpperCase();

            if (!receiverName || amount <= 0) return alert("No valid debt found.");

            // Safety Warning
            if (debtor.c < amount) {
                if (!confirm(`${debtorName} only has $${debtor.c}, but owes $${amount}. Proceed with a negative balance?`)) return;
            }

            if (confirm(`SETTLE: Take $${amount} from ${debtorName} and pay ${receiverName}?`)) {
                
                // 1. SUBTRACT (Take away) from the person paying
                debtor.c -= amount;

                // 2. ADD (Give to) the person receiving
                if (database[receiverName]) {
                    database[receiverName].c += amount;
                } else {
                    alert(`${receiverName} isn't in the ledger. Money was taken from ${debtorName} but could not be added to a receiver account.`);
                }

                // 3. WIPE the debt from the debtor's profile
                debtor.d1.amt = 0;
                debtor.d1.name = "";

                // 4. Update Database
                localStorage.setItem('blackjack_db', JSON.stringify(database));
                renderLog();
                log("DEBT_SETTLED_CORRECTLY");
            }
        }

        function deleteAccount(name) {
            if (document.getElementById('adminPass').value !== PASS) return alert("Wrong Password");
            if (confirm(`Delete ${name}?`)) {
                delete database[name];
                localStorage.setItem('blackjack_db', JSON.stringify(database));
                renderLog();
                log("ACCOUNT_DELETED");
            }
        }

        function renderLog() {
            const logEl = document.getElementById('storageLog');
            logEl.innerHTML = '';
            const entries = Object.values(database).reverse();
            if (entries.length === 0) {
                logEl.innerHTML = '<p class="text-[10px] text-zinc-800 italic text-center py-6 uppercase font-bold tracking-widest">No Active Records</p>';
                return;
            }
            entries.forEach(p => {
                const net = p.c - (p.d1.amt || 0);
                const hasDebt = p.d1.amt > 0;
                const row = document.createElement('div');
                row.className = "p-6 border border-zinc-900 rounded-[1.5rem] bg-zinc-950/50 space-y-4";
                row.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col">
                            <span class="text-3xl font-black uppercase text-white tracking-tighter">${p.n}</span>
                            <span class="text-[11px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Cash: $${p.c.toLocaleString()}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-3xl font-black ${net < 0 ? 'text-red-600' : 'text-green-500'} big-money">$${net.toLocaleString()}</span>
                            <p class="text-[8px] text-zinc-700 uppercase font-bold tracking-tighter">Net Total</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-zinc-900">
                        <span class="text-[10px] font-bold uppercase ${hasDebt ? 'text-red-900' : 'text-zinc-800'}">
                            ${hasDebt ? `Owes ${p.d1.name}: $${p.d1.amt.toLocaleString()}` : 'No Debts'}
                        </span>
                        <div class="flex gap-2">
                             ${hasDebt ? `<button onclick="paySpecificDebt('${p.n}')" class="bg-green-950 text-green-400 border border-green-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-green-600 hover:text-white transition-all">Settle Debt</button>` : ''}
                             <button onclick="deleteAccount('${p.n}')" class="text-[9px] text-zinc-800 border border-zinc-900 px-3 py-1 rounded hover:text-red-600 transition-all uppercase font-bold">Delete</button>
                        </div>
                    </div>`;
                logEl.appendChild(row);
            });
        }

        function getFormData() {
            return {
                n: document.getElementById('pName').value.trim().toUpperCase(),
                c: parseFloat(document.getElementById('pChips').value) || 0,
                d1: { name: document.getElementById('debtor1').value.trim().toUpperCase(), amt: parseFloat(document.getElementById('debtAmt1').value) || 0 }
            };
        }

        function saveLocal() {
            if (document.getElementById('adminPass').value !== PASS) return log("PASS_DENIED", true);
            const player = getFormData();
            if (!player.n) return alert("NAME REQUIRED");
            database[player.n] = player;
            localStorage.setItem('blackjack_db', JSON.stringify(database));
            renderLog();
            log("SAVED_LOCALLY");
        }

        async function saveTagOnly() {
            if (!checkNFC()) return;
            if (document.getElementById('adminPass').value !== PASS) return log("PASS_DENIED", true);
            const player = getFormData();
            try {
                const ndef = new NDEFReader();
                log("TAP_TAG...");
                await ndef.write(JSON.stringify(player));
                log("TAG_WRITE_OK");
            } catch (e) { log("NFC_ERROR", true); }
        }

        async function saveBoth() {
            if (!checkNFC()) return;
            if (document.getElementById('adminPass').value !== PASS) return log("PASS_DENIED", true);
            const player = getFormData();
            try {
                const ndef = new NDEFReader();
                log("SYNC_TAP...");
                await ndef.write(JSON.stringify(player));
                saveLocal();
                log("SYNC_SUCCESS");
            } catch (e) { log("SYNC_ERROR", true); }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(database));
            const dl = document.createElement('a');
            dl.href = dataStr;
            dl.download = "blackjack_ledger.json";
            dl.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                database = JSON.parse(event.target.result);
                localStorage.setItem('blackjack_db', JSON.stringify(database));
                renderLog();
            };
            reader.readAsText(e.target.files[0]);
        }

        renderLog();
    </script>
</body>
</html>
